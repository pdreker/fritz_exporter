name: Run Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  run-checks:
    runs-on: ubuntu-latest
    name: Run Unit Tests
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Lint with ruff
        id: ruff
        continue-on-error: true
        run: |
          uv run ruff check . | tee lint.log
          ruff_check=${PIPESTATUS[0]}
          uv run ruff format --check . | tee -a lint.log
          ruff_format=${PIPESTATUS[0]}
          rescode=$(( ruff_check != 0 ? ruff_check : ruff_format ))
          echo "lint<<EOF" >> $GITHUB_OUTPUT
          cat lint.log >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          exit $rescode
      - name: Run pytest
        id: pytest
        continue-on-error: true
        run: |
          uv run pytest | tee test.log
          rescode=${PIPESTATUS[0]}
          echo "tests<<EOF" >> $GITHUB_OUTPUT
          cat test.log >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          exit $rescode
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
